{{define "index.html"}}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="tidepool">
  <meta name="theme-color" content="#0f172a">
  <title>tidepool</title>
  <link rel="manifest" href="/static/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen antialiased">
  <main class="mx-auto max-w-2xl p-4 space-y-6">
    <header class="flex items-baseline justify-between">
      <h1 class="text-2xl font-semibold">tidepool</h1>
      <span class="text-xs text-slate-500">files auto-delete after 24h</span>
    </header>

    <section class="rounded-2xl bg-white shadow-sm ring-1 ring-slate-200 p-4 space-y-3">
      <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Clipboard</h2>
      <div id="clip">{{template "clip" .Clip}}</div>
    </section>

    <section class="rounded-2xl bg-white shadow-sm ring-1 ring-slate-200 p-4 space-y-3">
      <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Upload</h2>
      <form hx-post="/files"
            hx-encoding="multipart/form-data"
            hx-target="#files"
            hx-swap="afterbegin"
            hx-on::after-request="if(event.detail.successful){this.reset()}"
            class="flex flex-col sm:flex-row gap-2">
        <input type="file" name="file" required
               class="block w-full text-sm text-slate-700 file:mr-3 file:rounded-lg file:border-0 file:bg-slate-100 file:px-3 file:py-1.5 file:text-sm file:font-medium hover:file:bg-slate-200">
        <button class="rounded-lg bg-slate-900 text-white px-4 py-2 text-sm font-medium hover:bg-slate-800">Upload</button>
      </form>
    </section>

    <section class="rounded-2xl bg-white shadow-sm ring-1 ring-slate-200 p-4 space-y-3">
      <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Files</h2>
      <ul id="files" class="divide-y divide-slate-100">
        {{range .Files}}{{template "file_row" .}}{{else}}
          <li class="py-3 text-sm text-slate-500">No files yet.</li>
        {{end}}
      </ul>
    </section>
  </main>
</body>
</html>
{{end}}
